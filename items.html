<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@4.6.2/dist/css/bootstrap.min.css">
    <script src="https://cdn.jsdelivr.net/npm/jquery@3.7.1/dist/jquery.slim.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/popper.js@1.16.1/dist/umd/popper.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@4.6.2/dist/js/bootstrap.bundle.min.js"></script>

    <link rel="stylesheet" href="index.css">
    <title>Items</title>
</head>

<body>

<!-- Navbar -->
<header>
    <div class="container-fluid navbar-dark bg-dark fixed-top">
        <nav class="navbar navbar-expand-sm navbar-dark">
            <button class="navbar-toggler" data-toggle="collapse" data-target="#nav">
                <span class="navbar-toggler-icon"></span>
            </button>

            <div class="collapse navbar-collapse justify-content-center" id="nav">
                <ul class="navbar-nav">
                    <li class="nav-item"><a class="nav-link text-light" href="index.html">Home</a></li>
                    <li class="nav-item"><a class="nav-link text-light" href="about.html">About</a></li>
                    <li class="nav-item"><a class="nav-link text-light" href="items.html">Items</a></li>
                    <li class="nav-item"><a class="nav-link text-light" href="location.html">Location</a></li>
                </ul>
            </div>
        </nav>
    </div>
</header>

<div class="container mt-5 pt-5">
    <div class="row">

        <!-- Chicken Biryani -->
        <div class="col-md-4">
            <div class="card bg-dark text-light">
                <img src="./images/chickenbiryani.avif" class="card-img-top" data-toggle="modal" data-target="#modal1">
                <div class="card-body text-center">
                    <h5>Chicken Biryani</h5>
                </div>
            </div>
        </div>

        <!-- Mutton Biryani -->
        <div class="col-md-4">
            <div class="card bg-dark text-light">
                <img src="./images/muttonbiryani.avif" class="card-img-top" data-toggle="modal" data-target="#modal2">
                <div class="card-body text-center">
                    <h5>Mutton Biryani</h5>
                </div>
            </div>
        </div>

        <!-- Pizza -->
        <div class="col-md-4">
            <div class="card bg-dark text-light">
                <img src="./images/pizza.jpg" class="card-img-top" data-toggle="modal" data-target="#modal3">
                <div class="card-body text-center">
                    <h5>Pizza</h5>
                </div>
            </div>
        </div>

    </div>
</div>

<!-- Modals -->

<!-- Modal 1 -->
<div class="modal fade" id="modal1">
    <div class="modal-dialog">
        <div class="modal-content bg-dark text-light">
            <div class="modal-header">
                <h5>Chicken Biryani</h5>
                <button class="close" data-dismiss="modal">&times;</button>
            </div>
            <div class="modal-body text-center">
                <img src="./images/chickenbiryani.avif" width="100%">
                <p>Price: ₹189</p>
            </div>
        </div>
    </div>
</div>

<!-- Modal 2 -->
<div class="modal fade" id="modal2">
    <div class="modal-dialog">
        <div class="modal-content bg-dark text-light">
            <div class="modal-header">
                <h5>Mutton Biryani</h5>
                <button class="close" data-dismiss="modal">&times;</button>
            </div>
            <div class="modal-body text-center">
                <img src="./images/muttonbiryani.avif" width="100%">
                <p>Price: ₹219</p>
            </div>
        </div>
    </div>
</div>

<!-- Modal 3 -->
<div class="modal fade" id="modal3">
    <div class="modal-dialog">
        <div class="modal-content bg-dark text-light">
            <div class="modal-header">
                <h5>Pizza</h5>
                <button class="close" data-dismiss="modal">&times;</button>
            </div>
            <div class="modal-body text-center">
                <img src="./images/pizza.jpg" width="100%">
                <p>Price: ₹249</p>
            </div>
        </div>
    </div>
</div>

<!-- Footer -->
<footer class="bg-dark text-light text-center p-4 mt-5">
    <img src="./images/footerimage.JPG" width="200"><br><br>
    <p>KPHB Colony, Hyderabad</p>
    <p>© AURAAA</p>
</footer>

</body>
</html>
