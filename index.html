<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- Bootstrap CSS -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@4.6.2/dist/css/bootstrap.min.css">

    <!-- JS -->
    <script src="https://cdn.jsdelivr.net/npm/jquery@3.7.1/dist/jquery.slim.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/popper.js@1.16.1/dist/umd/popper.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@4.6.2/dist/js/bootstrap.bundle.min.js"></script>

    <link rel="stylesheet" href="index.css">
    <title>AURAAA</title>
</head>

<body>

<!-- Navbar -->
<header>
    <div class="container-fluid navbar-dark bg-dark fixed-top">
        <nav class="navbar navbar-expand-sm">
            <button class="navbar-toggler" data-toggle="collapse" data-target="#nav">
                <span class="navbar-toggler-icon"></span>
            </button>

            <div class="collapse navbar-collapse justify-content-center" id="nav">
                <ul class="navbar-nav">
                    <li class="nav-item"><a class="nav-link text-light" href="index.html">Home</a></li>
                    <li class="nav-item"><a class="nav-link text-light" href="about.html">About</a></li>
                    <li class="nav-item"><a class="nav-link text-light" href="items.html">Items</a></li>
                    <li class="nav-item"><a class="nav-link text-light" href="location.html">Location</a></li>
                </ul>
            </div>
        </nav>
    </div>
</header>

<!-- Carousel -->
<div class="container-fluid mt-5 pt-4">
    <div id="demo" class="carousel slide" data-ride="carousel">

        <!-- Indicators -->
        <ul class="carousel-indicators">
            <li data-target="#demo" data-slide-to="0" class="active"></li>
            <li data-target="#demo" data-slide-to="1"></li>
            <li data-target="#demo" data-slide-to="2"></li>
        </ul>

        <!-- Slides -->
        <div class="carousel-inner">
            <div class="carousel-item active">
                <img src="./images/photo2.jpg" class="d-block w-100">
            </div>
            <div class="carousel-item">
                <img src="./images/photo3.jpg" class="d-block w-100">
            </div>
            <div class="carousel-item">
                <img src="./images/photo4.jpg" class="d-block w-100">
            </div>
        </div>

        <!-- Controls -->
        <a class="carousel-control-prev" href="#demo" data-slide="prev">
            <span class="carousel-control-prev-icon"></span>
        </a>
        <a class="carousel-control-next" href="#demo" data-slide="next">
            <span class="carousel-control-next-icon"></span>
        </a>

    </div>
</div>

<!-- Cards -->
<div class="container mt-4">
    <div class="row">

        <div class="col-md-4">
            <div class="card bg-dark text-light">
                <img src="./images/chickenbiryani.avif" class="card-img-top">
                <div class="card-body">
                    <h5>Chicken Biryani</h5>
                </div>
            </div>
        </div>

        <div class="col-md-4">
            <div class="card bg-dark text-light">
                <img src="./images/muttonbiryani.avif" class="card-img-top">
                <div class="card-body">
                    <h5>Mutton Biryani</h5>
                </div>
            </div>
        </div>

        <div class="col-md-4">
            <div class="card bg-dark text-light">
                <img src="./images/pizza.jpg" class="card-img-top">
                <div class="card-body">
                    <h5>Pizza</h5>
                </div>
            </div>
        </div>

    </div>
</div>

<!-- Footer -->
<footer class="mt-5 bg-dark text-light p-4 text-center">
    <img src="./images/footerimage.JPG" width="200"><br><br>
    <p>KPHB Colony, Hyderabad</p>
    <p>© AURAAA</p>
</footer>

</body>
</html>
